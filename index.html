<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERN Wi-Fi Guest Access</title>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const baseGrantUrl = urlParams.get('base_grant_url');
        const userContinueUrl = urlParams.get('user_continue_url') || "https://hern.sk";

        function connect(lang) {
            if (!baseGrantUrl) {
                alert("Chyba: base_grant_url nebol nájdený. Ste pripojený cez Meraki?");
                return;
            }
            window.location.href = baseGrantUrl + "?continue_url=" + encodeURIComponent(userContinueUrl);
        }

        function switchLang(lang) {
            document.querySelectorAll('.lang-section').forEach(div => div.style.display = 'none');
            document.getElementById('lang-' + lang).style.display = 'block';
        }
    </script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f4; }
        .container { background: white; padding: 30px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .lang-section { display: none; }
        .logo { max-width: 100%; height: auto; margin-bottom: 20px; }
        .lang-nav { margin-bottom: 20px; font-weight: bold; }
        .lang-nav a { text-decoration: none; color: #b38a00; margin: 0 10px; cursor: pointer; }
        button { background-color: #b38a00; color: white; border: none; padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 5px; width: 100%; margin-top: 20px; }
        button:hover { background-color: #8c6c00; }
        h1 { font-size: 22px; color: #333; }
        p { color: #666; font-size: 14px; }
    </style>
</head>
        
<body onload="switchLang('sk')">
    <div class="container">
        <!-- Pozor na názov súboru loga na GitHube! Musí sa zhodovať. -->
        <img src="Hern_zlata_with%20steel.png" alt="HERN Logo" class="logo">
        
        <div class="lang-nav">
            <a onclick="switchLang('sk')">SK</a> | 
            <a onclick="switchLang('en')">EN</a> | 
            <a onclick="switchLang('de')">DE</a>
        </div>

        <div id="lang-sk" class="lang-section" style="display:block;">
            <h1>Vitajte v HERN s.r.o.</h1>
            <p>Kliknutím na tlačidlo súhlasíte s podmienkami používania hosťovskej siete.</p>
            <button onclick="connect('sk')">Pripojiť sa</button>
        </div>

        <div id="lang-en" class="lang-section">
            <h1>Welcome to HERN s.r.o.</h1>
            <p>By clicking the button you agree to the terms of use.</p>
            <button onclick="connect('en')">Connect</button>
        </div>

        <div id="lang-de" class="lang-section">
            <h1>Willkommen bei HERN s.r.o.</h1>
            <p>Mit dem Klick auf die Schaltfläche akzeptieren Sie die Nutzungsbedingungen.</p>
            <button onclick="connect('de')">Verbinden</button>
        </div>
    </div>
</body>
</html>
