<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERN Wi-Fi Guest Access</title>
    <script>
    const urlParams = new URLSearchParams(window.location.search);
    const baseGrantUrl = urlParams.get('base_grant_url');
    const userContinueUrl = urlParams.get('user_continue_url') || "https://hern.sk";

    window.onload = function() {
        if (base_grant_url) {
            // Meraki posiela base_grant_url v tvare https://network-auth.com
            // My potrebujeme poslať POST na https://network-auth.com
            const url = new URL(baseGrantUrl);
            const loginUrl = url.origin + "/splash/login"; 

            document.querySelectorAll('.login-form').forEach(form => {
                form.action = loginUrl;
            });
            document.querySelectorAll('.continue-input').forEach(input => {
                input.value = userContinueUrl;
            });
        }
        switchLang('sk');
    };

    function switchLang(lang) {
        document.querySelectorAll('.lang-section').forEach(div => div.style.display = 'none');
        document.getElementById('lang-' + lang).style.display = 'block';
    }
</script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 0; background-color: #f4f4f4; }
        .container { background: white; padding: 30px; border-radius: 12px; max-width: 350px; margin: 10vh auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .logo { max-width: 70%; margin-bottom: 20px; }
        .flags { font-size: 24px; margin-bottom: 10px; cursor: pointer; }
        .lang-section { display: none; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #b38a00; color: white; border: none; padding: 15px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 6px; width: 100%; margin-top: 10px; }
        .terms-link { color: #b38a00; text-decoration: underline; font-size: 12px; }
        p { font-size: 13px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <img src="Hern_zlata_with%20steel.png" alt="HERN Logo" class="logo">
        
        <div class="flags">
            <span onclick="switchLang('sk')">🇸🇰</span>
            <span onclick="switchLang('en')">🇬🇧</span>
            <span onclick="switchLang('de')">🇩🇪</span>
        </div>

        <!-- SK Sekcia -->
        <div id="lang-sk" class="lang-section">
            <h1>Prihlásenie</h1>
            <form class="login-form" method="POST">
                <input type="hidden" name="continue_url" class="continue-input">
                <input type="email" name="username" placeholder="E-mail (Meraki účet)" required>
                <input type="password" name="password" placeholder="Heslo" required>
                <p>Súhlasím s <a href="podmienky.html" target="_blank" class="terms-link">podmienkami</a>.</p>
                <button type="submit">Prihlásiť sa</button>
            </form>
        </div>

        <!-- EN Sekcia -->
        <div id="lang-en" class="lang-section">
            <h1>Login</h1>
            <form class="login-form" method="POST">
                <input type="hidden" name="continue_url" class="continue-input">
                <input type="email" name="username" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <p>I agree to the <a href="podmienky_en.html" target="_blank" class="terms-link">terms</a>.</p>
                <button type="submit">Login</button>
            </form>
        </div>

        <!-- DE Sekcia -->
        <div id="lang-de" class="lang-section">
            <h1>Anmeldung</h1>
            <form class="login-form" method="POST">
                <input type="hidden" name="continue_url" class="continue-input">
                <input type="email" name="username" placeholder="E-Mail" required>
                <input type="password" name="password" placeholder="Passwort" required>
                <p>Ich stimme den <a href="podmienky_de.html" target="_blank" class="terms-link">Bedingungen</a> zu.</p>
                <button type="submit">Anmelden</button>
            </form>
        </div>
    </div>
</body>
</html>
